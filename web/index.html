<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interview Copilot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: transparent;          /* let desktop show through */
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      overflow: hidden;
    }

    /* ── Background layer — opacity-only, never touches #app ─ */
    /* #bg and #app are siblings. CSS opacity on #bg has zero   */
    /* effect on #app's text — siblings don't inherit opacity.  */
    #bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: var(--bg-alpha, 0.93);   /* slider controls this */
      transition: opacity .1s;
    }

    /* ── App layer (always 100% opaque) ─────────────────── */
    #app {
      position: relative;
      z-index: 1;
      width: 100%; height: 100%;
    }

    /* ── CSS theme variables (dark default) ─────────────── */
    :root {
      --bg-alpha: 0.93;
      --bg:       rgba(10,10,10,  var(--bg-alpha));
      --hdr:      rgba(18,18,18,  0.97);
      --sticky:   rgba(10,10,10,  0.97);

      --accent:      #a8ff78;
      --accent-dim:  rgba(168,255,120,0.62);
      --accent-faint:rgba(168,255,120,0.25);
      --border:      rgba(168,255,120,0.16);
      --body-dim:    rgba(210,210,210,0.70);
      --label-color: rgba(168,255,120,0.30);
      --ph-color:    rgba(168,255,120,0.22);
      --btn-color:   rgba(168,255,120,0.65);
      --hist-q:      rgba(200,200,200,0.50);
      --hist-a:      rgba(168,255,120,0.60);
    }

    /* ── Header — three-zone layout ─────────────────────── */
    #header {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 44px;
      background: var(--hdr);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0 6px;
      -webkit-app-region: drag;
      z-index: 100;
      overflow: hidden;
    }

    #app-title {
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 0.08em;
      color: var(--accent);
      opacity: 0.8;
      text-transform: uppercase;
      flex-shrink: 0;
      white-space: nowrap;
      padding-right: 6px;
    }

    /* Middle zone — shrinks, hides overflow */
    .hdr-mid {
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      gap: 5px;
      overflow: hidden;
      min-width: 0;
      -webkit-app-region: no-drag;
    }

    /* Right zone — never shrinks, always visible */
    .hdr-right {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
      margin-left: 4px;
    }

    #engine-selector {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent-faint);
      border-radius: 4px;
      padding: 3px 4px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      outline: none;
      flex-shrink: 0;
      max-width: 80px;
    }
    #engine-selector option { background: #1a1a1a; color: #a8ff78; }

    /* B/W theme toggle */
    .theme-toggle {
      display: flex;
      border: 1px solid var(--accent-faint);
      border-radius: 3px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .theme-btn {
      background: none;
      border: none;
      color: var(--btn-color);
      font-size: 12px;
      padding: 2px 5px;
      cursor: pointer;
      font-family: inherit;
      line-height: 1;
      transition: background .15s;
    }
    .theme-btn:first-child { border-right: 1px solid var(--accent-faint); }
    .theme-btn.active { background: var(--accent-faint); color: var(--accent); }
    .theme-btn:hover:not(.active) { background: rgba(128,128,128,0.1); }

    /* Opacity slider */
    .opacity-wrap {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
      pointer-events: auto;
    }
    .opacity-icon { font-size: 12px; color: var(--label-color); line-height: 1; user-select: none; }
    #opacity-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 60px;
      height: 6px;
      background: var(--accent-faint);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
      -webkit-app-region: no-drag;
      pointer-events: auto;
      position: relative;
      z-index: 200;
      flex-shrink: 0;
    }
    #opacity-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 2px solid rgba(0,0,0,0.35);
      box-shadow: 0 0 4px rgba(168,255,120,0.5);
      transition: box-shadow .15s, transform .1s;
    }
    #opacity-slider::-webkit-slider-thumb:hover {
      box-shadow: 0 0 8px rgba(168,255,120,0.85);
      transform: scale(1.15);
    }
    #opacity-slider::-moz-range-thumb {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 2px solid rgba(0,0,0,0.35);
    }

    /* Deepgram error banner */
    #deepgram-error {
      display: none;
      position: sticky;
      top: 44px;
      z-index: 50;
      background: rgba(200,40,40,0.18);
      border-bottom: 1px solid rgba(255,80,80,0.35);
      color: #ff8080;
      font-size: 11px;
      padding: 4px 12px;
      letter-spacing: 0.04em;
      text-align: center;
    }
    #deepgram-error.on { display: block; }

    /* Status dot */
    #status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #ff4444;
      flex-shrink: 0;
      transition: background .3s;
    }
    #status-dot.connected    { background: #a8ff78; }
    #status-dot.reconnecting { background: #ffaa00; }

    /* Win buttons — fixed size, always visible */
    .win-btn {
      background: none;
      border: 1px solid var(--accent-faint);
      border-radius: 3px;
      color: var(--btn-color);
      font-size: 13px;
      line-height: 1;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-family: inherit;
      flex-shrink: 0;
      transition: background .15s, color .15s, border-color .15s;
    }
    .win-btn:hover { background: var(--accent-faint); color: var(--accent); }
    #btn-close:hover { background: rgba(255,80,80,0.2); border-color: #ff5050; color: #ff5050; }

    /* ── Main scroll area ────────────────────────────────── */
    #main {
      position: absolute;
      top: 44px; bottom: 0; left: 0; right: 0;
      overflow-y: scroll;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }
    #main::-webkit-scrollbar { width: 5px; }
    #main::-webkit-scrollbar-track { background: transparent; }
    #main::-webkit-scrollbar-thumb { background: var(--accent-faint); border-radius: 3px; }
    #main::-webkit-scrollbar-thumb:hover { background: var(--accent-dim); }

    /* ── Sticky current Q&A ──────────────────────────────── */
    #current-wrap {
      position: sticky;
      top: 0; z-index: 10;
      background: var(--sticky);
      padding: 10px 12px 12px;
      border-bottom: 1px solid var(--border);
    }

    .sec-label {
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--label-color);
      margin-bottom: 7px;
    }

    .qa-row {
      display: flex;
      gap: 7px;
      align-items: flex-start;
      margin-bottom: 5px;
    }
    .qa-row:last-child { margin-bottom: 0; }

    .ql {
      font-size: 9px;
      color: var(--label-color);
      flex-shrink: 0;
      margin-top: 2px;
      letter-spacing: 0.05em;
      font-weight: bold;
    }
    .ql.interviewer { color: #ffaa00; }  /* Orange for interviewer */
    .ql.you         { color: #64b5f6; }  /* Blue for interviewee */
    .ql.ai          { color: var(--accent); }  /* Green for AI */

    .q-type {
      font-size: 8px;
      color: var(--label-color);
      opacity: 0.6;
      margin-left: 4px;
    }
    .q-type.follow-up { color: #64b5f6; }
    .q-type.rephrased { color: #ba68c8; }
    .q-type.clarify { color: #ff8a65; }

    #cur-q {
      color: var(--body-dim);
      font-size: 12px;
      line-height: 1.45;
      word-break: break-word;
      flex: 1;
    }
    #cur-a {
      color: var(--accent);
      font-size: 12px;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
      flex: 1;
      min-height: 18px;
      max-height: 200px;
      overflow-y: auto;
    }
    #cur-a::-webkit-scrollbar { width: 3px; }
    #cur-a::-webkit-scrollbar-thumb { background: var(--accent-faint); border-radius: 2px; }

    #cur-you {
      color: #64b5f6;
      font-size: 12px;
      line-height: 1.45;
      word-break: break-word;
      flex: 1;
    }

    .hist-you {
      color: #64b5f6;
      font-size: 11px;
      line-height: 1.4;
      word-break: break-word;
      font-style: italic;
    }

    .placeholder {
      color: var(--ph-color);
      font-style: italic;
    }

    @keyframes thinking-pulse {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 1; }
    }
    .thinking {
      color: var(--accent-dim);
      font-style: italic;
      animation: thinking-pulse 1.1s ease-in-out infinite;
    }

    /* ── Action bar (always visible) ────────────────────── */
    #action-bar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      padding: 5px 12px;
      background: var(--sticky);
      border-bottom: 1px solid var(--border);
    }

    .hist-action-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--label-color);
      font-size: 9px;
      padding: 2px 7px;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.05em;
      transition: color .15s, border-color .15s, background .15s;
    }
    .hist-action-btn:hover { color: var(--accent); border-color: var(--accent-dim); background: var(--accent-faint); }

    /* ── History ─────────────────────────────────────────── */
    #history-hdr {
      display: none;
      padding: 6px 12px 2px;
    }
    #history-hdr.on { display: block; }

    #history { padding-bottom: 24px; }

    .qa-pair {
      padding: 9px 12px;
      border-bottom: 1px solid rgba(128,128,128,0.1);
    }
    .qa-pair:last-child { border-bottom: none; }

    .hist-q { color: var(--hist-q); font-size: 11px; line-height: 1.4; word-break: break-word; }
    .hist-a { color: var(--hist-a); font-size: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }

    /* ── Resize grip ─────────────────────────────────────── */
    #resize-grip {
      position: fixed;
      bottom: 0; right: 0;
      width: 15px; height: 15px;
      cursor: se-resize;
      z-index: 200;
      opacity: 0.35;
      background-image:
        radial-gradient(circle, rgba(168,255,120,.9) 1px, transparent 1px),
        radial-gradient(circle, rgba(168,255,120,.9) 1px, transparent 1px),
        radial-gradient(circle, rgba(168,255,120,.9) 1px, transparent 1px),
        radial-gradient(circle, rgba(168,255,120,.9) 1px, transparent 1px),
        radial-gradient(circle, rgba(168,255,120,.9) 1px, transparent 1px),
        radial-gradient(circle, rgba(168,255,120,.9) 1px, transparent 1px);
      background-size: 5px 5px;
      background-position: 1px 1px, 6px 1px, 1px 6px, 11px 1px, 6px 6px, 1px 11px;
      background-repeat: no-repeat;
    }
    #resize-grip:hover { opacity: 0.85; }

    /* ── Karaoke word highlighting ───────────────────────── */
    .word { display: inline; }
    .word.active {
      background: var(--accent);
      color: #000;
      border-radius: 3px;
      padding: 0 2px;
      font-weight: bold;
    }

    /* ── Uploads modal ───────────────────────────────────── */
    #uploads-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      z-index: 999;
      overflow-y: auto;
      padding: 20px 10px;
    }
    #uploads-modal.open { display: block; }
    .modal-box {
      max-width: 460px;
      margin: 0 auto;
      background: var(--sticky);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .modal-hdr {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .modal-title { color: var(--accent); font-size: 12px; font-weight: bold; letter-spacing: 0.08em; }
    .modal-close {
      background: none; border: none; color: var(--btn-color);
      font-size: 16px; cursor: pointer; font-family: inherit;
    }
    #drop-zone {
      border: 2px dashed var(--accent-dim);
      border-radius: 6px;
      padding: 18px 12px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 12px;
      color: var(--body-dim);
      font-size: 12px;
      transition: background .15s, border-color .15s;
    }
    #drop-zone:hover, #drop-zone.drag-over {
      background: var(--accent-faint);
      border-color: var(--accent);
    }
    #drop-zone b { color: var(--accent); }
    #drop-zone small { color: var(--label-color); display: block; margin-top: 4px; font-size: 10px; }
    #uploads-list { max-height: 260px; overflow-y: auto; }
    .upload-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .upload-item:last-child { border-bottom: none; }
    .upload-name { flex: 1; color: var(--body-dim); word-break: break-all; }
    .upload-chars { color: var(--label-color); font-size: 10px; white-space: nowrap; }
    .upload-del {
      background: none; border: none; color: #e55;
      cursor: pointer; font-size: 14px; padding: 0 2px;
      line-height: 1; flex-shrink: 0;
    }
    .upload-del:hover { color: #ff3333; }
    .uploads-empty { color: var(--ph-color); font-style: italic; font-size: 12px; text-align: center; padding: 12px 0; }
  </style>
</head>
<body>

  <!-- Background layer — opacity slider controls this only -->
  <div id="bg"></div>

  <!-- App layer — always fully opaque text and UI -->
  <div id="app">

    <div id="header">
      <span id="app-title">⚡ Copilot</span>

      <!-- Middle: shrinkable controls -->
      <div class="hdr-mid">
        <select id="engine-selector">
          <option value="groq">⚡ Groq</option>
          <option value="claude">🧠 Claude</option>
        </select>
        <div class="theme-toggle" title="Background color">
          <button class="theme-btn active" id="btn-dark"  title="Dark">■</button>
          <button class="theme-btn"        id="btn-light" title="Light">□</button>
        </div>
        <div class="opacity-wrap" title="Background opacity">
          <span class="opacity-icon">◐</span>
          <input type="range" id="opacity-slider" min="10" max="100" value="93" step="3">
        </div>
        <div class="opacity-wrap" id="uend-wrap" title="Pause sensitivity (ms before answer triggers)">
          <span class="opacity-icon">⏱</span>
          <input type="range" id="uend-slider" min="500" max="3000" value="1500" step="250">
        </div>
        <div id="status-dot" title="Connection status"></div>
      </div>

      <!-- Right: always visible window buttons -->
      <div class="hdr-right">
        <button class="win-btn" id="btn-min"   title="Minimize">─</button>
        <button class="win-btn" id="btn-close" title="Close">✕</button>
      </div>
    </div>

    <div id="deepgram-error">⚠ Deepgram offline — transcription paused, retrying…</div>

    <div id="main">

      <!-- Sticky current Q&A -->
      <div id="current-wrap">
        <div class="sec-label">Current</div>
        <div class="qa-row">
          <span class="ql interviewer">Interviewer</span>
          <div id="cur-q"><span class="placeholder">Listening…</span></div>
        </div>
        <div class="qa-row">
          <span class="ql ai">AI</span>
          <div id="cur-a"><span class="placeholder">Answer streams here…</span></div>
        </div>
        <div class="qa-row" id="you-row" style="display:none">
          <span class="ql you">You</span>
          <div id="cur-you"></div>
        </div>
      </div>

      <!-- Always-visible action bar -->
      <div id="action-bar">
        <button id="btn-uploads"   class="hist-action-btn" title="Manage context documents">📎 DOCS</button>
        <button id="btn-summarize" class="hist-action-btn" title="Generate end-of-interview debrief">SUMMARIZE</button>
        <button id="btn-clear"     class="hist-action-btn" title="Clear history and reset context">CLEAR</button>
      </div>

      <!-- History header — label only, shown when history exists -->
      <div id="history-hdr">
        <span class="sec-label" style="margin-bottom:0">History</span>
      </div>

      <!-- Completed Q&A pairs — newest first -->
      <div id="history"></div>

    </div>

  </div><!-- #app -->

  <!-- Uploads modal -->
  <div id="uploads-modal">
    <div class="modal-box">
      <div class="modal-hdr">
        <span class="modal-title">📎 CONTEXT DOCUMENTS</span>
        <button class="modal-close" id="btn-uploads-close" title="Close">✕</button>
      </div>
      <div id="drop-zone">
        Drop files here or <b>click to browse</b>
        <small>Supports .txt .md .json .pdf .docx — 10 MB max each</small>
        <input type="file" id="file-input" style="display:none" multiple accept=".txt,.md,.json,.pdf,.docx">
      </div>
      <div id="uploads-list"></div>
    </div>
  </div>

  <div id="resize-grip"></div>

  <script>
    const WS_URL    = `ws://${window.location.host}/ws/ui`;
    const curQ      = document.getElementById('cur-q');
    const curA      = document.getElementById('cur-a');
    const curYou    = document.getElementById('cur-you');
    const youRow    = document.getElementById('you-row');
    const histDiv   = document.getElementById('history');
    const histHdr   = document.getElementById('history-hdr');
    const selector  = document.getElementById('engine-selector');
    const statusDot = document.getElementById('status-dot');
    const opSlider     = document.getElementById('opacity-slider');
    const uendSlider   = document.getElementById('uend-slider');
    const deepgramErr  = document.getElementById('deepgram-error');
    const bgEl         = document.getElementById('bg');
    const root         = document.documentElement;
    const mainEl       = document.getElementById('main');

    let ws = null;
    let currentUend = 1500;
    let curQText = '';
    let curAText = '';
    let curYouText = '';
    let answerSpan = null;
    let answerDone = false;   // true after answer_done, until next transcript
    let currentQType = 'new_topic';

    // ── Karaoke state ──────────────────────────────────────
    let karaokeWords  = [];   // [{text: normalized, el: span}]
    let karaokePos    = 0;    // index of the word currently being read (highlighted)
    let karaokeBuffer = '';   // accumulator for partial LLM tokens
    let karaokeActive = false;

    function karaokeReset() {
      karaokeWords  = [];
      karaokePos    = 0;
      karaokeBuffer = '';
      karaokeActive = false;
    }

    // Build word spans as LLM tokens stream in
    function karaokeAppend(token) {
      karaokeBuffer += token;
      const parts = karaokeBuffer.split(/(\s+)/);
      const hasTrailingSpace = /\s$/.test(karaokeBuffer);
      const complete = hasTrailingSpace ? parts : parts.slice(0, -1);
      karaokeBuffer  = hasTrailingSpace ? '' : (parts[parts.length - 1] || '');

      complete.forEach(chunk => {
        if (/^\s+$/.test(chunk)) {
          curA.appendChild(document.createTextNode(chunk));
        } else if (chunk) {
          const span = document.createElement('span');
          span.className = 'word';
          span.textContent = chunk;
          curA.appendChild(span);
          karaokeWords.push({
            text: chunk.toLowerCase().replace(/[^a-z0-9]/g, ''),
            el: span
          });
        }
      });
      karaokeApplyHighlight();
    }

    // Flush any partial last token on answer_done
    function karaokeFlush() {
      if (karaokeBuffer) {
        const span = document.createElement('span');
        span.className = 'word';
        span.textContent = karaokeBuffer;
        curA.appendChild(span);
        karaokeWords.push({
          text: karaokeBuffer.toLowerCase().replace(/[^a-z0-9]/g, ''),
          el: span
        });
        karaokeBuffer = '';
      }
      karaokeApplyHighlight();
      karaokeActive = false;
    }

    // Highlight only the current active word
    function karaokeApplyHighlight() {
      karaokeWords.forEach((w, i) => {
        w.el.className = i === karaokePos ? 'word active' : 'word';
      });
      if (karaokeWords[karaokePos]) {
        karaokeWords[karaokePos].el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }
    }

    function toWords(text) {
      return text.toLowerCase().replace(/[^a-z0-9\s]/g, '').split(/\s+/).filter(Boolean);
    }

    // Tail-anchor search: take the last N spoken words as a phrase, find that
    // exact sequence in the answer, and advance the highlight to right after it.
    //
    // Why this works: the user is reading the AI answer verbatim, so the tail
    // of what they've said so far is a unique N-gram that pinpoints their exact
    // position in the answer. Multi-word exact matching eliminates the false
    // positives that plagued single-word includes() matching.
    //
    // Fires on every mic_transcript (interim) — cumulative spoken text grows
    // word-by-word, so the tail anchor advances naturally without delta tracking.
    function karaokeMatchSpoken(spokenText) {
      if (!karaokeWords.length) return;

      const spoken    = toWords(spokenText);
      if (!spoken.length) return;

      const ansWords  = karaokeWords.map(w => w.text);

      // Try anchors from longest (most precise) to shortest (fallback)
      // Max anchor = 4 words; minimum = 1
      const maxAnchor = Math.min(4, spoken.length);

      for (let anchorLen = maxAnchor; anchorLen >= 1; anchorLen--) {
        const tail = spoken.slice(-anchorLen);   // last N spoken words

        // Search forward from slightly before current pos (allows ±2 correction)
        const from = Math.max(0, karaokePos - 2);

        for (let i = from; i <= ansWords.length - anchorLen; i++) {
          // Require every word in the anchor to match exactly (after normalization)
          let hit = true;
          for (let j = 0; j < anchorLen; j++) {
            if (ansWords[i + j] !== tail[j]) { hit = false; break; }
          }
          if (hit) {
            const newPos = i + anchorLen;
            if (newPos > karaokePos) {          // only advance, never go backward
              karaokePos = newPos;
              karaokeApplyHighlight();
            }
            return;                             // stop — longest match wins
          }
        }
      }
    }

    // ── Opacity / transparency ─────────────────────────────
    // Clamps slider value (10–100) and applies both:
    //   1. CSS #bg opacity  → smooth visual fade of the background div
    //   2. Win32 set_opacity → actual window-level alpha so desktop shows through
    // Text always stays fully opaque because #app is a sibling of #bg (not a child).
    // Text-shadow adds a readable backdrop when the window goes very transparent.

    let currentOpacity = 93; // matches slider default value

    function applyOpacity(val) {
      currentOpacity = Math.max(10, Math.min(100, val));
      opSlider.value = currentOpacity;
      localStorage.setItem('ih_opacity', currentOpacity);

      // 1. Fade the background div so the colour softly disappears
      bgEl.style.opacity = currentOpacity / 100;

      // 2. Apply real window transparency via Python/Win32
      if (window.pywebview && window.pywebview.api && window.pywebview.api.set_opacity) {
        window.pywebview.api.set_opacity(currentOpacity);
      }

      // 3. Boost text-shadow when transparent so text stays legible
      //    Shadow intensity ramps up as opacity drops below 70.
      const shadowStrength = Math.max(0, (70 - currentOpacity) / 70);
      const shadowBlur     = Math.round(shadowStrength * 6);
      const shadowAlpha    = (shadowStrength * 0.95).toFixed(2);
      const shadowColor    = bgMode === 'dark'
        ? `rgba(0,0,0,${shadowAlpha})`
        : `rgba(255,255,255,${shadowAlpha})`;
      const shadow = shadowBlur > 0
        ? `0 0 ${shadowBlur}px ${shadowColor}, 0 1px ${shadowBlur}px ${shadowColor}`
        : 'none';
      document.querySelectorAll('#cur-q, #cur-a, .hist-q, .hist-a, .sec-label, .ql, .placeholder')
        .forEach(el => el.style.textShadow = shadow);
    }

    // ── Theme system ───────────────────────────────────────
    // bgMode controls R,G,B of the background div only.
    // Text/UI vars change to remain readable on that background.

    let bgMode  = 'dark';  // 'dark' | 'light'
    let bgAlpha = 0.93;

    const THEMES = {
      dark: {
        bgRgb:          '10,10,10',
        hdr:            'rgba(18,18,18,0.97)',
        sticky:         'rgba(10,10,10,0.97)',
        accent:         '#a8ff78',
        accentDim:      'rgba(168,255,120,0.62)',
        accentFaint:    'rgba(168,255,120,0.25)',
        border:         'rgba(168,255,120,0.16)',
        bodyDim:        'rgba(210,210,210,0.70)',
        labelColor:     'rgba(168,255,120,0.30)',
        phColor:        'rgba(168,255,120,0.22)',
        btnColor:       'rgba(168,255,120,0.65)',
        histQ:          'rgba(200,200,200,0.50)',
        histA:          'rgba(168,255,120,0.60)',
      },
      light: {
        bgRgb:          '235,235,235',
        hdr:            'rgba(215,215,215,0.97)',
        sticky:         'rgba(235,235,235,0.97)',
        accent:         '#1a7a00',
        accentDim:      'rgba(26,122,0,0.65)',
        accentFaint:    'rgba(26,122,0,0.22)',
        border:         'rgba(0,100,0,0.18)',
        bodyDim:        'rgba(30,30,30,0.75)',
        labelColor:     'rgba(0,100,0,0.38)',
        phColor:        'rgba(0,100,0,0.25)',
        btnColor:       'rgba(0,100,0,0.60)',
        histQ:          'rgba(40,40,40,0.60)',
        histA:          'rgba(20,90,0,0.75)',
      },
    };

    function applyTheme() {
      const t = THEMES[bgMode];
      // #bg is always solid — window-level alpha (set_opacity) controls see-through
      bgEl.style.background = `rgb(${t.bgRgb})`;

      root.style.setProperty('--hdr',          t.hdr);
      root.style.setProperty('--sticky',       t.sticky);
      root.style.setProperty('--accent',       t.accent);
      root.style.setProperty('--accent-dim',   t.accentDim);
      root.style.setProperty('--accent-faint', t.accentFaint);
      root.style.setProperty('--border',       t.border);
      root.style.setProperty('--body-dim',     t.bodyDim);
      root.style.setProperty('--label-color',  t.labelColor);
      root.style.setProperty('--ph-color',     t.phColor);
      root.style.setProperty('--btn-color',    t.btnColor);
      root.style.setProperty('--hist-q',       t.histQ);
      root.style.setProperty('--hist-a',       t.histA);

      document.getElementById('engine-selector').style.background =
        bgMode === 'light' ? '#ddd' : '#111';
    }

    document.getElementById('btn-dark').addEventListener('click', () => {
      bgMode = 'dark';
      document.getElementById('btn-dark').classList.add('active');
      document.getElementById('btn-light').classList.remove('active');
      localStorage.setItem('ih_theme', 'dark');
      applyTheme();
    });

    document.getElementById('btn-light').addEventListener('click', () => {
      bgMode = 'light';
      document.getElementById('btn-light').classList.add('active');
      document.getElementById('btn-dark').classList.remove('active');
      localStorage.setItem('ih_theme', 'light');
      applyTheme();
    });

    opSlider.addEventListener('input', () => {
      applyOpacity(parseInt(opSlider.value, 10));
    });

    // Also support mouse-wheel on the slider for fine control
    opSlider.addEventListener('wheel', e => {
      e.preventDefault();
      const delta = e.deltaY < 0 ? 3 : -3;
      applyOpacity(currentOpacity + delta);
    }, { passive: false });

    // ── Helpers ────────────────────────────────────────────

    function archiveAndReset() {
      if (!curQText && !curAText) return;

      const pair = document.createElement('div');
      pair.className = 'qa-pair';

      // Interviewer row
      const qRow = document.createElement('div');
      qRow.className = 'qa-row';
      const qlQ = document.createElement('span');
      qlQ.className = 'ql interviewer';
      qlQ.textContent = 'Interviewer';
      const qTxt = document.createElement('div'); qTxt.className = 'hist-q';
      qTxt.textContent = curQText || '(no transcript)';
      qRow.appendChild(qlQ); qRow.appendChild(qTxt);
      if (currentQType && currentQType !== 'new_topic') {
        const typeSpan = document.createElement('span');
        typeSpan.className = 'q-type ' + currentQType.replace('_', '-');
        const typeLabels = { 'follow_up': '↳ Follow-up', 'rephrased': '↻ Rephrased', 'clarification': '? Clarify' };
        typeSpan.textContent = typeLabels[currentQType] || '';
        if (typeSpan.textContent) qRow.appendChild(typeSpan);
      }

      // AI row
      const aRow = document.createElement('div');
      aRow.className = 'qa-row';
      const qlA = document.createElement('span'); qlA.className = 'ql ai'; qlA.textContent = 'AI';
      const aTxt = document.createElement('div'); aTxt.className = 'hist-a';
      aTxt.textContent = curAText;
      aRow.appendChild(qlA); aRow.appendChild(aTxt);

      pair.appendChild(qRow);
      pair.appendChild(aRow);

      // You row — only if user said something
      if (curYouText) {
        const yRow = document.createElement('div');
        yRow.className = 'qa-row';
        const qlY = document.createElement('span'); qlY.className = 'ql you'; qlY.textContent = 'You';
        const yTxt = document.createElement('div'); yTxt.className = 'hist-you';
        yTxt.textContent = curYouText;
        yRow.appendChild(qlY); yRow.appendChild(yTxt);
        pair.appendChild(yRow);
      }

      histDiv.insertBefore(pair, histDiv.firstChild);
      histHdr.classList.add('on');

      curQText = ''; curAText = ''; curYouText = '';
      answerSpan = null; answerDone = false; currentQType = 'new_topic';
      karaokeReset();
      curQ.innerHTML = '<span class="placeholder">Listening…</span>';
      curA.innerHTML = '<span class="placeholder">Answer streams here…</span>';
      curYou.textContent = '';
      youRow.style.display = 'none';
    }

    // ── WebSocket ──────────────────────────────────────────

    function connect() {
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        statusDot.className = 'connected';
        ws.send(JSON.stringify({ type: 'set_engine',        value: selector.value }));
        ws.send(JSON.stringify({ type: 'set_utterance_end', value: currentUend }));
      };
      ws.onclose = () => {
        statusDot.className = 'reconnecting';
        ws = null;
        setTimeout(connect, 2000);
      };
      ws.onerror = () => { if (ws) ws.close(); };

      ws.onmessage = ({ data }) => {
        let msg;
        try { msg = JSON.parse(data); } catch { return; }

        switch (msg.type) {
          case 'transcript': {
            if (answerDone) archiveAndReset();
            curQText = msg.text;
            curQ.textContent = msg.text;
            break;
          }
          case 'answer_thinking': {
            curA.innerHTML = '<span class="thinking">Thinking…</span>';
            answerSpan = null;
            karaokeReset();
            karaokeActive = true;
            break;
          }
          case 'answer_chunk': {
            const th = curA.querySelector('.thinking');
            if (th) { th.remove(); }
            const ph = curA.querySelector('.placeholder');
            if (ph) { ph.remove(); }
            curAText += msg.text;
            karaokeAppend(msg.text);
            mainEl.scrollTop = 0;
            break;
          }
          case 'answer_done': {
            karaokeFlush();
            answerDone = true;
            break;
          }
          case 'mic_transcript': {
            youRow.style.display = 'flex';
            curYou.textContent = msg.text;
            karaokeMatchSpoken(msg.text);   // interim — tail-anchor search
            break;
          }
          case 'user_speech': {
            curYouText = msg.text;
            youRow.style.display = 'flex';
            curYou.textContent = msg.text;
            karaokeMatchSpoken(msg.text);   // final — same algorithm
            break;
          }
          case 'summary_start': {
            curQText = 'Session Summary';
            curQ.textContent = 'Session Summary';
            curAText = '';
            curA.innerHTML = '';
            answerDone = false;
            answerSpan = null;
            karaokeReset();
            break;
          }
          case 'uploads_changed': {
            if (document.getElementById('uploads-modal').classList.contains('open')) {
              refreshUploads();
            }
            break;
          }
          case 'deepgram_status': {
            deepgramErr.classList.toggle('on', !msg.connected);
            break;
          }
          case 'question_type': {
            currentQType = msg.question_type; 
            break; 
          }
        }
      };
    }

    // ── Controls ───────────────────────────────────────────

    selector.addEventListener('change', () => {
      localStorage.setItem('ih_engine', selector.value);
      if (ws && ws.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ type: 'set_engine', value: selector.value }));
    });

    uendSlider.addEventListener('change', () => {
      currentUend = parseInt(uendSlider.value, 10);
      uendSlider.title = `${currentUend}ms`;
      localStorage.setItem('ih_uend', currentUend);
      if (ws && ws.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ type: 'set_utterance_end', value: currentUend }));
    });

    document.getElementById('btn-summarize').addEventListener('click', () => {
      if (ws && ws.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ type: 'summarize' }));
    });

    document.getElementById('btn-clear').addEventListener('click', () => {
      histDiv.innerHTML = '';
      histHdr.classList.remove('on');
      if (ws && ws.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ type: 'reset_context' }));
    });

    // ── Uploads modal ──────────────────────────────────────

    async function openUploads() {
      document.getElementById('uploads-modal').classList.add('open');
      await refreshUploads();
    }
    function closeUploads() {
      document.getElementById('uploads-modal').classList.remove('open');
    }
    async function refreshUploads() {
      try {
        const res = await fetch('/uploads');
        const items = await res.json();
        const list = document.getElementById('uploads-list');
        if (!items.length) {
          list.innerHTML = '<div class="uploads-empty">No documents uploaded yet.</div>';
          return;
        }
        list.innerHTML = items.map(u => `
          <div class="upload-item">
            <input type="checkbox" ${u.enabled ? 'checked' : ''}
              onchange="toggleUpload('${u.id}', this.checked)" title="Include in LLM context">
            <span class="upload-name">${escHtml(u.name)}</span>
            <span class="upload-chars">${(u.chars/1000).toFixed(1)}K</span>
            <button class="upload-del" onclick="deleteUpload('${u.id}')" title="Delete">🗑</button>
          </div>`).join('');
      } catch (e) {
        console.error('refreshUploads error', e);
      }
    }
    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    async function toggleUpload(id, enabled) {
      try {
        await fetch(`/uploads/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enabled })
        });
      } catch (e) { console.error('toggleUpload error', e); }
    }
    async function deleteUpload(id) {
      try {
        await fetch(`/uploads/${id}`, { method: 'DELETE' });
        await refreshUploads();
      } catch (e) { console.error('deleteUpload error', e); }
    }
    async function uploadFiles(files) {
      for (const f of files) {
        const fd = new FormData();
        fd.append('file', f);
        try {
          const res = await fetch('/upload', { method: 'POST', body: fd });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            alert(`Upload failed: ${err.detail || res.statusText}`);
          }
        } catch (e) { console.error('upload error', e); }
      }
      await refreshUploads();
    }

    document.getElementById('btn-uploads').addEventListener('click', openUploads);
    document.getElementById('btn-uploads-close').addEventListener('click', closeUploads);

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => {
      uploadFiles(e.target.files);
      e.target.value = ''; // reset so same file can be re-added
    });
    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      uploadFiles(e.dataTransfer.files);
    });

    document.getElementById('btn-min').addEventListener('click', () => {
      if (window.pywebview) window.pywebview.api.minimize();
    });
    document.getElementById('btn-close').addEventListener('click', () => {
      if (window.pywebview) window.pywebview.api.close();
    });

    // ── Custom Drag ────────────────────────────────────────

    const headerEl = document.getElementById('header');
    let isDragging = false, dragStartX = 0, dragStartY = 0, winStartX = 0, winStartY = 0;
    
    headerEl.addEventListener('mousedown', async e => {
      // Ignore clicks on controls
      if (e.target.closest('.hdr-right') || e.target.closest('.hdr-mid')) return;
      if (e.target.closest('button') || e.target.closest('select') || e.target.closest('input')) return;
      
      e.preventDefault();
      if (!window.pywebview) return;
      
      const pos = await window.pywebview.api.get_position();
      winStartX = pos[0];
      winStartY = pos[1];
      dragStartX = e.screenX;
      dragStartY = e.screenY;
      isDragging = true;
    });

    // ── Resize grip ────────────────────────────────────────

    const grip = document.getElementById('resize-grip');
    let resizing = false, startX, startY, startW, startH;
    let rafPending = false, nextW, nextH;

    grip.addEventListener('mousedown', async e => {
      e.preventDefault();
      startX = e.screenX; startY = e.screenY;
      if (window.pywebview) {
        const sz = await window.pywebview.api.get_size();
        startW = sz[0]; startH = sz[1];
      } else {
        startW = 420; startH = 600;
      }
      resizing = true;
    });

    document.addEventListener('mousemove', e => {
      if (isDragging) {
        if (!rafPending) {
          rafPending = true;
          requestAnimationFrame(() => {
            rafPending = false;
            if (window.pywebview)
              window.pywebview.api.move_to(Math.round(winStartX + (e.screenX - dragStartX)), Math.round(winStartY + (e.screenY - dragStartY)));
          });
        }
        return;
      }
      
      if (!resizing) return;
      nextW = Math.max(320, startW + (e.screenX - startX));
      nextH = Math.max(350, startH + (e.screenY - startY));
      if (!rafPending) {
        rafPending = true;
        requestAnimationFrame(() => {
          rafPending = false;
          if (window.pywebview)
            window.pywebview.api.resize(Math.round(nextW), Math.round(nextH));
        });
      }
    });

    document.addEventListener('mouseup', () => { 
      resizing = false; 
      isDragging = false; 
    });

    // ── Persistent settings (localStorage) ─────────────────
    (function loadSettings() {
      const op     = parseInt(localStorage.getItem('ih_opacity') || '93', 10);
      const theme  = localStorage.getItem('ih_theme')  || 'dark';
      const engine = localStorage.getItem('ih_engine') || 'groq';
      const uend   = parseInt(localStorage.getItem('ih_uend') || '1500', 10);
      currentOpacity = op;
      bgMode         = theme;
      currentUend    = uend;
      uendSlider.value = uend;
      selector.value   = engine;
      document.getElementById('btn-dark').classList.toggle('active',  theme === 'dark');
      document.getElementById('btn-light').classList.toggle('active', theme === 'light');
    })();

    // Apply initial theme + opacity, then connect
    applyTheme();
    applyOpacity(currentOpacity);
    connect();
  </script>
</body>
